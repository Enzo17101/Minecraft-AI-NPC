services:
  backend-npc-ai:
    build: .
    container_name: backend_npc_ai
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - .:/app 
      - ./models_cache:/root/.cache/huggingface
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]