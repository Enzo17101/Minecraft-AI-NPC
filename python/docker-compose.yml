services:
  redis:
    image: redis:alpine
    container_name: npc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Enabling appendonly ensures we don't lose session data if the container restarts
    command: redis-server --appendonly yes
  backend-npc-ai:
    build: .
    container_name: backend_npc_ai
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app 
      - ./models_cache:/root/.cache/huggingface
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
              
volumes:
  redis_data: